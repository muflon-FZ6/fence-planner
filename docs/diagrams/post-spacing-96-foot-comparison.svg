<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Compare two post-spacing choices on the same fence line</title>
  <desc id="desc">A backyard property line is shown with two inset planning strips: one uses eight-foot spacing and thirteen posts over ninety-six feet; the other uses six-foot spacing and seventeen posts over the same distance.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#edf5ef"/><stop offset="1" stop-color="#fbf3e7"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#214d3d" flood-opacity=".15"/></filter>
    <style>.label{font-family:Arial,Helvetica,sans-serif;fill:#183e32}.large{font-size:46px;font-weight:700}.small{font-size:28px;font-weight:650}.note{font-size:24px;fill:#426358}.line{stroke:#315f48;stroke-width:8;stroke-linecap:round}.post{fill:#315f48;stroke:#fbfaf5;stroke-width:3}.dim{stroke:#c6802c;stroke-width:4;stroke-dasharray:10 9;fill:none}</style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="105" y="110" class="label large">More closely spaced posts mean more posts and holes</text>
  <text x="105" y="155" class="label note">Compare the options on the same straight fence line before you choose a system.</text>
  <g filter="url(#shadow)"><rect x="100" y="210" width="1400" height="570" rx="36" fill="#dcebd7" stroke="#c0d3c2" stroke-width="4"/></g>
  <!-- property line context -->
  <path d="M200 290H1400" stroke="#b5aa91" stroke-width="5" stroke-dasharray="12 12"/>
  <text x="200" y="267" class="label note">same 96 ft straight side of the yard</text>
  <path d="M200 315H1400" class="dim"/><path d="M200 299v32M1400 299v32" stroke="#c6802c" stroke-width="4"/>
  <!-- row 8ft -->
  <rect x="172" y="375" width="1256" height="125" rx="25" fill="#fdfbf5"/>
  <text x="215" y="425" class="label small">8 ft spacing</text><text x="215" y="462" class="label note">13 posts on 96 ft</text>
  <path d="M585 437H1340" class="line"/>
  <g class="post"><circle cx="585" cy="437" r="13"/><circle cx="648" cy="437" r="13"/><circle cx="711" cy="437" r="13"/><circle cx="774" cy="437" r="13"/><circle cx="837" cy="437" r="13"/><circle cx="900" cy="437" r="13"/><circle cx="963" cy="437" r="13"/><circle cx="1026" cy="437" r="13"/><circle cx="1089" cy="437" r="13"/><circle cx="1152" cy="437" r="13"/><circle cx="1215" cy="437" r="13"/><circle cx="1278" cy="437" r="13"/><circle cx="1340" cy="437" r="13"/></g>
  <!-- row 6ft -->
  <rect x="172" y="550" width="1256" height="125" rx="25" fill="#fdfbf5"/>
  <text x="215" y="600" class="label small">6 ft spacing</text><text x="215" y="637" class="label note">17 posts on 96 ft</text>
  <path d="M585 612H1340" class="line"/>
  <g class="post"><circle cx="585" cy="612" r="11"/><circle cx="632" cy="612" r="11"/><circle cx="679" cy="612" r="11"/><circle cx="726" cy="612" r="11"/><circle cx="773" cy="612" r="11"/><circle cx="820" cy="612" r="11"/><circle cx="867" cy="612" r="11"/><circle cx="914" cy="612" r="11"/><circle cx="961" cy="612" r="11"/><circle cx="1008" cy="612" r="11"/><circle cx="1055" cy="612" r="11"/><circle cx="1102" cy="612" r="11"/><circle cx="1149" cy="612" r="11"/><circle cx="1196" cy="612" r="11"/><circle cx="1243" cy="612" r="11"/><circle cx="1290" cy="612" r="11"/><circle cx="1340" cy="612" r="11"/></g>
  <!-- simple conclusion -->
  <g filter="url(#shadow)"><rect x="380" y="710" width="840" height="72" rx="22" fill="#fff9e9" stroke="#c6802c" stroke-width="3"/></g>
  <text x="800" y="756" text-anchor="middle" class="label small">On this simple run, 6 ft spacing adds 4 posts and 4 holes.</text>
  <text x="800" y="846" text-anchor="middle" class="label note">Corners and gates can change the count. Follow the product’s required spacing.</text>
</svg>
