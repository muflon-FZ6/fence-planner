<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Use actual panel spacing and plan for the last section</title>
  <desc id="desc">A straight fence shows several full panels and a final smaller section, with simple callouts to confirm the product dimensions and inspect the final section before cutting.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#edf5ef"/><stop offset="1" stop-color="#fbf4e8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#214d3d" flood-opacity=".16"/></filter>
    <style>.label{font-family:Arial,Helvetica,sans-serif;fill:#183e32}.large{font-size:46px;font-weight:700}.small{font-size:28px;font-weight:650}.note{font-size:24px;fill:#426358}.post{fill:#315f48}.panel{fill:#b97845;stroke:#8c542d;stroke-width:4}.last{fill:#e6bc74;stroke:#ad7427;stroke-width:4}.line{stroke:#426358;stroke-width:4;fill:none}.dash{stroke:#c6802c;stroke-width:5;stroke-dasharray:14 12;fill:none}</style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="105" y="110" class="label large">Plan the whole line—not just the full panels</text>
  <text x="105" y="155" class="label note">The final section is normal. Notice it before you buy, cut, or move a gate.</text>
  <g filter="url(#shadow)"><rect x="100" y="225" width="1400" height="500" rx="36" fill="#dcebd7" stroke="#c0d3c2" stroke-width="4"/></g>
  <!-- level ground -->
  <path d="M185 629H1415" stroke="#7d9d72" stroke-width="10" stroke-linecap="round"/>
  <!-- posts -->
  <g class="post"><rect x="205" y="355" width="31" height="280" rx="8"/><rect x="470" y="355" width="31" height="280" rx="8"/><rect x="735" y="355" width="31" height="280" rx="8"/><rect x="1000" y="355" width="31" height="280" rx="8"/><rect x="1240" y="355" width="31" height="280" rx="8"/></g>
  <!-- panels -->
  <rect x="236" y="396" width="234" height="200" rx="8" class="panel"/><rect x="501" y="396" width="234" height="200" rx="8" class="panel"/><rect x="766" y="396" width="234" height="200" rx="8" class="panel"/><rect x="1031" y="396" width="209" height="200" rx="8" class="last"/>
  <!-- board grain -->
  <g stroke="#d69c6a" stroke-width="5" opacity=".75"><path d="M265 421v150M310 421v150M355 421v150M400 421v150M545 421v150M590 421v150M635 421v150M680 421v150M810 421v150M855 421v150M900 421v150M945 421v150"/></g>
  <!-- center spacing -->
  <path d="M220 334H486M486 334H751M751 334H1016" class="dash"/>
  <path d="M220 318v32M486 318v32M751 318v32M1016 318v32" class="line"/>
  <rect x="555" y="270" width="460" height="56" rx="28" fill="#fffdf7" stroke="#c6802c" stroke-width="3"/>
  <text x="785" y="307" text-anchor="middle" class="label small">Use the spacing in your product instructions</text>
  <!-- callout 1 -->
  <g filter="url(#shadow)"><rect x="160" y="470" width="275" height="112" rx="18" fill="#fffdf8"/></g>
  <text x="190" y="512" class="label small">Full panels</text><text x="190" y="547" class="label note">go between their posts</text>
  <path d="M435 530H360" class="line"/>
  <!-- callout 2 -->
  <g filter="url(#shadow)"><rect x="1090" y="650" width="340" height="108" rx="18" fill="#fffdf8"/></g>
  <text x="1120" y="692" class="label small">Final short section</text><text x="1120" y="727" class="label note">may need a cut or layout change</text>
  <path d="M1160 650l-8-52" class="line"/>
  <!-- callout 3 -->
  <g filter="url(#shadow)"><rect x="550" y="640" width="370" height="83" rx="18" fill="#fffdf8"/></g>
  <text x="735" y="692" text-anchor="middle" class="label small">Confirm the actual system before cutting</text>
  <text x="800" y="846" text-anchor="middle" class="label note">Fence Planner can estimate materials. Product instructions determine final fit and cuts.</text>
</svg>
