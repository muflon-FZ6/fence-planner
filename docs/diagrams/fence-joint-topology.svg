<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">One fence turn uses one shared corner post</title>
  <desc id="desc">A simple overhead backyard view shows an L-shaped fence with three bare posts: two open ends and one shared corner post. The corner is highlighted as a single point where both fence directions meet.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#edf5ef"/><stop offset="1" stop-color="#faf2e5"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#214d3d" flood-opacity=".16"/></filter>
    <style>.label{font-family:Arial,Helvetica,sans-serif;fill:#183e32}.large{font-size:46px;font-weight:700}.small{font-size:28px;font-weight:650}.note{font-size:24px;fill:#426358}.fence{stroke:#9a613a;stroke-width:18;stroke-linecap:round;stroke-linejoin:round;fill:none}.string{stroke:#f7e1a0;stroke-width:5;stroke-dasharray:11 11;fill:none}.line{stroke:#426358;stroke-width:4;fill:none}</style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="105" y="110" class="label large">One fence turn uses one shared corner post</text>
  <text x="105" y="155" class="label note">Count the unique places where the fence starts, ends, turns, or opens for a gate.</text>
  <g filter="url(#shadow)"><rect x="100" y="220" width="1400" height="560" rx="36" fill="#dcebd7" stroke="#c0d3c2" stroke-width="4"/></g>
  <!-- house corner / patio -->
  <path d="M1090 650h270V410h-150V530h-120Z" fill="#f2ebe0" stroke="#9f8b75" stroke-width="5"/>
  <path d="M1120 672h160" stroke="#caa87e" stroke-width="18" stroke-linecap="round"/>
  <text x="1225" y="720" text-anchor="middle" class="label note">house / patio</text>
  <!-- simplified L fence -->
  <path d="M360 625V395H900" class="fence"/>
  <path d="M360 625V395H900" class="string"/>
  <!-- posts -->
  <g>
    <circle cx="360" cy="625" r="25" fill="#315f48" stroke="#fffdf7" stroke-width="7"/>
    <circle cx="360" cy="395" r="33" fill="#c6802c" stroke="#fff8e7" stroke-width="8"/>
    <circle cx="900" cy="395" r="25" fill="#315f48" stroke="#fffdf7" stroke-width="7"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="158" y="598" width="190" height="88" rx="18" fill="#fffdf8"/>
    <rect x="465" y="265" width="330" height="92" rx="18" fill="#fff9e9" stroke="#c6802c" stroke-width="3"/>
    <rect x="940" y="360" width="230" height="88" rx="18" fill="#fffdf8"/>
  </g>
  <text x="188" y="636" class="label small">Open end</text><text x="188" y="668" class="label note">one post here</text><path d="M348 639L360 625" class="line"/>
  <text x="495" y="304" class="label small">Shared corner</text><text x="495" y="337" class="label note">one post serves both directions</text><path d="M560 357L390 395" class="line"/>
  <text x="970" y="398" class="label small">Open end</text><text x="970" y="430" class="label note">one post here</text><path d="M940 416L900 395" class="line"/>
  <g filter="url(#shadow)"><rect x="475" y="685" width="650" height="72" rx="22" fill="#fffdf8"/></g>
  <text x="800" y="731" text-anchor="middle" class="label small">This simple L shape has three post locations—not four.</text>
  <text x="800" y="850" text-anchor="middle" class="label note">Choose the fence system before deciding what hardware or bracing the corner needs.</text>
</svg>
