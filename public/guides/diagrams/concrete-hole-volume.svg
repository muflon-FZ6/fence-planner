<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Estimate concrete from the actual hole and post</title>
  <desc id="desc">A simple cutaway shows one fence post centered in a concrete-filled hole, with callouts for the actual post size, hole dimensions, and product-specific bag yield.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1"><stop stop-color="#eaf4ed"/><stop offset="1" stop-color="#f9f2e5"/></linearGradient>
    <linearGradient id="soil" x1="0" x2="0" y1="0" y2="1"><stop stop-color="#b58057"/><stop offset="1" stop-color="#865d42"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#214d3d" flood-opacity=".16"/></filter>
    <style>.label{font-family:Arial,Helvetica,sans-serif;fill:#183e32}.large{font-size:46px;font-weight:700}.small{font-size:28px;font-weight:650}.note{font-size:24px;fill:#426358}.line{stroke:#426358;stroke-width:4;fill:none}.dim{stroke:#c6802c;stroke-width:4;stroke-dasharray:10 9;fill:none}</style>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <text x="105" y="110" class="label large">Estimate concrete from the hole—not a “bags per post” rule</text>
  <text x="105" y="155" class="label note">Hole size comes from your local requirements and fence system. Bag yield comes from the product you buy.</text>
  <g filter="url(#shadow)"><rect x="100" y="215" width="1400" height="570" rx="36" fill="#fffdf7" stroke="#d5cdbd" stroke-width="4"/></g>
  <!-- ground -->
  <path d="M100 430H1500V785H100Z" fill="url(#soil)"/>
  <path d="M100 430H1500" stroke="#739a67" stroke-width="13"/>
  <!-- turf texture -->
  <g stroke="#7aa16c" stroke-width="4" opacity=".7"><path d="M210 420l8-20M255 430l-4-18M1330 428l5-18M1380 428l-8-20M1190 430l4-17"/></g>
  <!-- hole cutaway -->
  <path d="M655 430c0 84 20 218 65 303 25 48 135 48 160 0 45-85 65-219 65-303Z" fill="#5e4538" stroke="#513a30" stroke-width="6"/>
  <!-- concrete region -->
  <path d="M676 486c9 77 28 177 59 236 21 40 108 40 129 0 31-59 50-159 59-236Z" fill="#c8c3b9" stroke="#93908a" stroke-width="5"/>
  <!-- post -->
  <path d="M755 210h90v465c0 16-90 16-90 0Z" fill="#8d5b37" stroke="#5f3823" stroke-width="6"/>
  <path d="M771 225v429M800 225v429M829 225v429" stroke="#bc8353" stroke-width="5" opacity=".7"/>
  <path d="M743 210h114l-20-34h-74Z" fill="#a16b43" stroke="#5f3823" stroke-width="6"/>
  <!-- dimension arrows -->
  <path d="M645 466H955" class="dim"/><path d="M645 450v32M955 450v32" stroke="#c6802c" stroke-width="4"/>
  <rect x="675" y="365" width="250" height="52" rx="26" fill="#fff9e9" stroke="#c6802c" stroke-width="3"/>
  <text x="800" y="400" text-anchor="middle" class="label small">hole width</text>
  <path d="M1008 438V742" class="dim"/><path d="M992 438h32M992 742h32" stroke="#c6802c" stroke-width="4"/>
  <rect x="1035" y="564" width="170" height="52" rx="26" fill="#fff9e9" stroke="#c6802c" stroke-width="3"/>
  <text x="1120" y="599" text-anchor="middle" class="label small">hole depth</text>
  <!-- callouts -->
  <g filter="url(#shadow)"><rect x="175" y="270" width="365" height="112" rx="18" fill="#eff7ef"/><rect x="1055" y="252" width="355" height="112" rx="18" fill="#eff7ef"/><rect x="1035" y="665" width="370" height="87" rx="18" fill="#eff7ef"/></g>
  <text x="205" y="313" class="label small">Measure the actual post</text><text x="205" y="347" class="label note">or use its listed size</text><path d="M540 330L754 330" class="line"/>
  <text x="1085" y="295" class="label small">Set the hole detail first</text><text x="1085" y="330" class="label note">with local and product guidance</text><path d="M1055 350L923 448" class="line"/>
  <text x="1065" y="708" class="label small">Use the bag’s stated yield</text><text x="1065" y="739" class="label note">then round the project total up</text><path d="M1035 697L890 674" class="line"/>
  <text x="800" y="850" text-anchor="middle" class="label note">Fence Planner estimates material volume. It does not design a footing or determine local depth requirements.</text>
</svg>
